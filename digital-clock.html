<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⏰ Digital Clock - Multiple Time Zones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 1000px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
        }

        .clock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .clock-card:hover {
            transform: translateY(-10px);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.1));
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .timezone-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .timezone-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 15px;
        }

        .digital-time {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            font-family: 'Courier New', monospace;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .time-details {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .time-details .date {
            display: block;
            margin-top: 5px;
        }

        .time-details .day {
            display: block;
            margin-top: 3px;
            text-transform: capitalize;
        }

        /* Control Panel */
        .control-panel {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-weight: bold;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        .control-btn.active {
            background: #00ff88;
            color: #333;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
        }

        /* Format Toggle */
        .format-toggle {
            display: flex;
            gap: 5px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 3px;
            width: fit-content;
            margin: 0 auto;
        }

        .format-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .format-btn.active {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        /* Analog Clock (Optional) */
        .analog-clock {
            width: 150px;
            height: 150px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.2);
            margin: 15px auto;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .clock-center {
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 10px;
        }

        .hand.hour {
            width: 4px;
            height: 35px;
            background: rgba(0, 255, 136, 0.8);
            margin-left: -2px;
        }

        .hand.minute {
            width: 3px;
            height: 50px;
            background: rgba(0, 255, 136, 0.6);
            margin-left: -1.5px;
        }

        .hand.second {
            width: 2px;
            height: 55px;
            background: #ff6b9d;
            margin-left: -1px;
        }

        /* Add/Remove Timezone */
        .add-timezone {
            background: rgba(255, 255, 255, 0.1);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .add-timezone input,
        .add-timezone button {
            margin: 5px;
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            font-size: 0.9rem;
        }

        .add-timezone input {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .add-timezone input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .add-timezone button {
            background: #00ff88;
            color: #333;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .add-timezone button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
        }

        /* Remove Button */
        .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 107, 157, 0.6);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .remove-btn:hover {
            background: rgba(255, 107, 157, 1);
            transform: scale(1.1);
        }

        .clock-card {
            position: relative;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .digital-time {
                font-size: 2rem;
            }

            .clock-grid {
                grid-template-columns: 1fr;
            }

            .control-panel {
                flex-direction: column;
            }
        }

        /* Loading Animation */
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }

        .digital-time {
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>⏰ Digital Clock</h1>
            <p>Real-time display across multiple time zones worldwide</p>
        </div>

        <!-- Format Toggle -->
        <div style="text-align: center; margin-bottom: 20px;">
            <div class="format-toggle">
                <button class="format-btn active" data-format="12">12 Hour</button>
                <button class="format-btn" data-format="24">24 Hour</button>
            </div>
        </div>

        <!-- Control Panel -->
        <div class="control-panel">
            <button class="control-btn" id="addAnalog">➕ Add Analog Clock</button>
            <button class="control-btn" id="toggleAnalog">👁️ Toggle Analog</button>
            <button class="control-btn" id="resetClocks">🔄 Reset to Default</button>
        </div>

        <!-- Clock Grid -->
        <div class="clock-grid" id="clockGrid"></div>

        <!-- Add Custom Timezone -->
        <div class="add-timezone">
            <input type="text" id="timezoneInput" placeholder="Enter timezone (e.g., Asia/Kolkata)">
            <button id="addTimezoneBtn">➕ Add Custom Timezone</button>
            <p style="color: rgba(255, 255, 255, 0.6); font-size: 0.8rem; margin-top: 10px;">
                💡 Tip: Use IANA timezone names like Asia/Tokyo, America/New_York, Europe/London
            </p>
        </div>
    </div>

    <script>
        // ============================================================
        //  DIGITAL CLOCK - MULTIPLE TIME ZONES
        // ============================================================

        // Default timezones
        const DEFAULT_TIMEZONES = [
            { name: 'India (IST)', timezone: 'Asia/Kolkata' },
            { name: 'USA - New York (EST)', timezone: 'America/New_York' },
            { name: 'USA - Los Angeles (PST)', timezone: 'America/Los_Angeles' },
            { name: 'UK - London (GMT)', timezone: 'Europe/London' },
            { name: 'Japan (JST)', timezone: 'Asia/Tokyo' },
            { name: 'Australia - Sydney (AEDT)', timezone: 'Australia/Sydney' },
            { name: 'Germany - Berlin (CET)', timezone: 'Europe/Berlin' },
            { name: 'UAE - Dubai (GST)', timezone: 'Asia/Dubai' }
        ];

        // State
        let timezones = [...DEFAULT_TIMEZONES];
        let format24 = false;
        let showAnalog = false;

        // DOM Elements
        const clockGrid = document.getElementById('clockGrid');
        const formatBtns = document.querySelectorAll('.format-btn');
        const addTimezoneBtn = document.getElementById('addTimezoneBtn');
        const timezoneInput = document.getElementById('timezoneInput');
        const resetBtn = document.getElementById('resetClocks');
        const toggleAnalogBtn = document.getElementById('toggleAnalog');
        const addAnalogBtn = document.getElementById('addAnalog');

        // ---- Format Toggle ----
        formatBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                formatBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                format24 = btn.getAttribute('data-format') === '24';
            });
        });

        // ---- Add Custom Timezone ----
        addTimezoneBtn.addEventListener('click', () => {
            const tz = timezoneInput.value.trim();
            if (tz) {
                try {
                    new Date().toLocaleString('en-US', { timeZone: tz });
                    timezones.push({
                        name: tz.replace(/_/g, ' '),
                        timezone: tz
                    });
                    timezoneInput.value = '';
                    renderClocks();
                } catch (e) {
                    alert('Invalid timezone! Please use IANA format (e.g., Asia/Kolkata)');
                }
            }
        });

        timezoneInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTimezoneBtn.click();
        });

        // ---- Reset to Default ----
        resetBtn.addEventListener('click', () => {
            timezones = [...DEFAULT_TIMEZONES];
            showAnalog = false;
            toggleAnalogBtn.textContent = '👁️ Toggle Analog';
            renderClocks();
        });

        // ---- Toggle Analog Clocks ----
        toggleAnalogBtn.addEventListener('click', () => {
            showAnalog = !showAnalog;
            toggleAnalogBtn.textContent = showAnalog ? '👁️‍🗨️ Hide Analog' : '👁️ Toggle Analog';
            renderClocks();
        });

        // ---- Add Analog Clock ----
        addAnalogBtn.addEventListener('click', () => {
            showAnalog = true;
            toggleAnalogBtn.textContent = '👁️‍🗨️ Hide Analog';
            renderClocks();
        });

        // ---- Remove Timezone ----
        function removeTimezone(index) {
            timezones.splice(index, 1);
            renderClocks();
        }

        // ---- Render Clocks ----
        function renderClocks() {
            clockGrid.innerHTML = '';

            timezones.forEach((tz, index) => {
                const card = document.createElement('div');
                card.className = 'clock-card';

                const now = new Date();
                const timeStr = now.toLocaleString('en-US', {
                    timeZone: tz.timezone,
                    hour: format24 ? '2-digit' : 'numeric',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: !format24
                });

                const dateStr = now.toLocaleString('en-US', {
                    timeZone: tz.timezone,
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });

                const dayStr = now.toLocaleString('en-US', {
                    timeZone: tz.timezone,
                    weekday: 'long'
                });

                const analogHTML = showAnalog ? generateAnalogClock(tz.timezone) : '';

                card.innerHTML = `
                    <button class="remove-btn" onclick="removeTimezone(${index})">✕</button>
                    <div class="timezone-name">${tz.name}</div>
                    <div class="timezone-label">${tz.timezone}</div>
                    ${analogHTML}
                    <div class="digital-time">${timeStr}</div>
                    <div class="time-details">
                        <span class="date">${dateStr}</span>
                        <span class="day">${dayStr}</span>
                    </div>
                `;

                clockGrid.appendChild(card);
            });
        }

        // ---- Generate Analog Clock ----
        function generateAnalogClock(timezone) {
            const now = new Date();
            const localTime = new Date(now.toLocaleString('en-US', { timeZone: timezone }));

            const hours = localTime.getHours() % 12;
            const minutes = localTime.getMinutes();
            const seconds = localTime.getSeconds();

            const hourDeg = (hours * 30) + (minutes * 0.5);
            const minuteDeg = (minutes * 6) + (seconds * 0.1);
            const secondDeg = seconds * 6;

            return `
                <div class="analog-clock">
                    <div class="hand hour" style="transform: rotate(${hourDeg}deg);"></div>
                    <div class="hand minute" style="transform: rotate(${minuteDeg}deg);"></div>
                    <div class="hand second" style="transform: rotate(${secondDeg}deg);"></div>
                    <div class="clock-center"></div>
                </div>
            `;
        }

        // ---- Update Clock Every Second ----
        function updateClocks() {
            renderClocks();
        }

        setInterval(updateClocks, 1000);

        // Initial render
        renderClocks();

        console.log('%c⏰ DIGITAL CLOCK LOADED ⏰', 'color: #00ff88; font-size: 16px; font-weight: bold;');
        console.log('%cAdd custom timezones or toggle between 12/24 hour format!', 'color: #6bcbff;');
    </script>
</body>
</html>
